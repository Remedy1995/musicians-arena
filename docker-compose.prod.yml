services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
    depends_on:
      - api

  db:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musicians_arena}
      POSTGRES_USER: ${POSTGRES_USER:-musicians_arena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musicians_arena}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musicians_arena} -d ${POSTGRES_DB:-musicians_arena}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CHANNELS_USE_REDIS: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      RUN_MIGRATIONS: "True"
      RUN_COLLECTSTATIC: "True"
      WAIT_FOR_REDIS: "True"
      PORT: 8000
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CHANNELS_USE_REDIS: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      WAIT_FOR_REDIS: "True"
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  static_data:
  media_data:
